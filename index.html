<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1D4A1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Té Quemagrasas" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/kV57ppRY/Flavicon.png" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/pv99XjXM/cone-do-App-PWA.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Protocolo Té Quemagrasas</title>

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        background: #1A2E1A;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        font-family: 'Inter', sans-serif;
      }
      #root {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        background: #F7FAF5;
        position: relative;
        box-shadow: 0 0 60px rgba(0,0,0,0.35);
        overflow-x: hidden;
      }
      .fixed-element {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 480px;
        z-index: 50;
      }
      /* Fallback de erro — evita tela em branco */
      #app-error {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
        background: #F7FAF5;
      }
      #app-error h2 { color: #1D4A1A; font-family: 'Inter', sans-serif; margin-bottom: 1rem; }
      #app-error p  { color: #555; font-size: 14px; margin-bottom: 1.5rem; }
      #app-error button {
        background: #2E7D32; color: #fff; border: none;
        padding: 12px 28px; border-radius: 30px;
        font-size: 14px; font-weight: 700; cursor: pointer;
      }
      @keyframes screenEnter {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes screenSlide {
        from { opacity: 0; transform: translateX(24px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .screen-enter { animation: screenEnter 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
      .screen-slide { animation: screenSlide 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fallback visível se o JS não carregar -->
      <div id="app-error">
        <h2>Algo salió mal</h2>
        <p>Hubo un problema al cargar la aplicación.<br>Por favor, intenta de nuevo.</p>
        <button onclick="localStorage.clear(); window.location.reload();">Reiniciar app</button>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Se o React não montar em 8s, mostra o fallback de erro
      setTimeout(function() {
        var root = document.getElementById('root');
        var err  = document.getElementById('app-error');
        if (root && err && root.children.length <= 1) {
          err.style.display = 'flex';
        }
      }, 8000);
    </script>
  </body>
</html>
