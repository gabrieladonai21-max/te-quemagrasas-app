<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1D4A1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" href="https://wlcyvdqvmgbsrrmamsyv.supabase.co/storage/v1/object/public/assets/Flavicon.png" />
    <link rel="apple-touch-icon" href="https://wlcyvdqvmgbsrrmamsyv.supabase.co/storage/v1/object/public/assets/icone%20do-app-pwa.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>Protocolo Té Quemagrasas</title>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Minimal styles to prevent flash of unstyled content */
      body {
        background: #1A2E1A;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        font-family: 'Inter', sans-serif;
      }
      #root {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        background: #F7FAF5;
        position: relative;
        box-shadow: 0 0 60px rgba(0,0,0,0.35);
        overflow-x: hidden;
      }
      .fixed-element {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 480px;
        z-index: 50;
      }
      @keyframes screenEnter {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes screenSlide {
        from { opacity: 0; transform: translateX(24px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .screen-enter {
        animation: screenEnter 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      }
      .screen-slide {
        animation: screenSlide 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
